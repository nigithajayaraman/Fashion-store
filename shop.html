<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMIÈRE | Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html" class="active">Collection</a>
    <a href="order.html">Order</a>
  </nav>

  <header class="page-header">
    <h1>Our Exquisite Collection</h1>
    <p style="color: var(--text-secondary); font-size: 1.2rem;">Curated dresses for every memorable occasion.</p>
  </header>

  <section class="products-container">
    <div class="products-grid">
      <!-- Red Dress -->
      <div class="product-card">
        <div class="product-image">
          <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=1983&auto=format&fit=crop" alt="Elegant Red Dress">
        </div>
        <div class="product-info">
          <h3>Crimson Elegance</h3>
          <div class="product-price">₹240.00</div>
          <a href="order.html?dress=crimson" class="btn">Order Now</a>
        </div>
      </div>

      <!-- Black Dress -->
      <div class="product-card" style="animation-delay: 0.2s;">
        <div class="product-image">
          <img src="https://images.unsplash.com/photo-1539008835657-9e8e9680c956?q=80&w=1974&auto=format&fit=crop" alt="Classic Black Dress">
        </div>
        <div class="product-info">
          <h3>Noir Classic</h3>
          <div class="product-price">₹185.00</div>
          <a href="order.html?dress=noir" class="btn">Order Now</a>
        </div>
      </div>

      <!-- Floral Dress -->
      <div class="product-card" style="animation-delay: 0.4s;">
        <div class="product-image">
          <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=2000&auto=format&fit=crop" alt="Summer Floral Dress">
        </div>
        <div class="product-info">
          <h3>Botanical Breeze</h3>
          <div class="product-price">₹150.00</div>
          <a href="order.html?dress=botanical" class="btn">Order Now</a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 LUMIÈRE Fashion. All rights reserved.</p>
  </footer>
</body>
</html>
